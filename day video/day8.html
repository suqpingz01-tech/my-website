<body>

<div class="page">

<!-- ภาพหน้าปก -->

<!-- อย่าลืมใส่ id="ytplayer" + ?enablejsapi=1 ใส่ ?enablejsapi=1 ตรงจุดเริ่มต้นของ src ? ท้ายๆ -->

        <iframe id="ytplayer" width="1900" height="800" src="https://www.youtube.com/embed/NEfiusMrU64?enablejsapi=1" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
         referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
<!-- ภาพอื่นๆเพิ่มเติม -->
    <div class="slide">
        <img src="../img/8.png" alt="Screenshot" width="1000" height="500">
    </div>
<!-- ปุ่ม -->
    <button id="prev">❮</button>
    <button id="next">❯</button>
<!-- จุด -->
<div class="dots">
    <span class="dot active-dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
</div>

</div>
<!-- ชื่อวัน -->

            <h2>Day 8: おーらるえっち♡ぷれいやー</h2>
        </div>
<!-- ปุ่มโหลด -->
        <a href="https://www.dlsite.com/maniax/work/=/product_id/RJ01553186.html" target="_blank" class="download">
            <h3>Official Download</h3>
        </a>

    </div>
<!-- คำอธิบาย -->
    <div class="description">
        <p>A fully voiced Live2D simulation game starring a succubus heroine, 
                featuring both story-focused and free-play modes with a variety of unlockable content.
        </p>
    </div>
<!-- เลื่อน จุด หยุดวิดีโอ -->
<script>
const slides = document.querySelectorAll('.slide');
const dots = document.querySelectorAll('.dot');

let current = 0;
let player;

function onYouTubeIframeAPIReady() {
    player = new YT.Player('ytplayer');
}
function showSlide(index){

    if(player){
        player.pauseVideo();
    }

    slides.forEach(slide=>{
        slide.classList.remove('active');
    });

    dots.forEach(dot=>{
        dot.classList.remove('active-dot');
    });

    slides[index].classList.add('active');

    if(dots[index]){
        dots[index].classList.add('active-dot');
    }
}

document.getElementById('next').onclick = () => {
    current = (current + 1) % slides.length;
    showSlide(current);
};

document.getElementById('prev').onclick = () => {
    current = (current - 1 + slides.length) % slides.length;
    showSlide(current);
};

function onYouTubeIframeAPIReady() {
    console.log("YT Loaded");
    player = new YT.Player('ytplayer');
}
</script>

</div>
